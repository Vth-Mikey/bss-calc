<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Drive Calc (Fixed Scaling)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .container { background: #1a1a1a; padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 100%; max-width: 480px; border: 1px solid #333; }
        h2 { text-align: center; color: #f1c40f; margin-bottom: 1rem; text-transform: uppercase; font-size: 1.2rem; }
        .heads-up { background: rgba(52, 152, 219, 0.1); border: 1px solid #3498db; padding: 10px; border-radius: 8px; font-size: 0.8rem; color: #3498db; margin-bottom: 1.5rem; }
        .section-title { font-size: 0.75rem; color: #f1c40f; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; text-transform: uppercase; font-weight: bold; margin-top: 15px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; color: #aaa; }
        input, select { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #222; color: #fff; font-size: 1rem; box-sizing: border-box; }
        .result-box { background: #111; padding: 1.2rem; border-radius: 8px; text-align: center; border-left: 4px solid #2ecc71; margin-bottom: 15px; }
        .single-box { background: #111; padding: 1.2rem; border-radius: 8px; text-align: center; border-left: 4px solid #3498db; }
        .honey-value { display: block; font-size: 1.4rem; font-weight: bold; color: #2ecc71; }
        .notation { color: #f1c40f; font-size: 0.95rem; font-weight: 600; min-height: 1.2rem; }
        .row { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>BSS Drives Calculator <span style="font-size: 0.7rem; vertical-align: middle; opacity: 0.6;">v1.0</span></h2>
    <div class="heads-up">
        <strong>Scaling Verified:</strong> Math adjusted to match the 20.4B cost at Drive 273.
    </div>

    <div class="input-group">
        <label>Drive Type</label>
        <select id="driveType" onchange="calculate()">
            <option value="250000">Colored (White / Red / Blue)</option>
            <option value="1000000">Glitch Drive</option>
        </select>
    </div>

    <div class="section-title">Total Honey Needed</div>
    <div class="row">
        <div class="input-group" style="flex: 1;">
            <label>Current Amt</label>
            <input type="number" id="current" value="272" oninput="calculate()">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>Goal</label>
            <input type="number" id="target" value="500" oninput="calculate()">
        </div>
    </div>

    <div class="result-box">
        <span id="result" class="honey-value">0</span>
        <div id="notation" class="notation"></div>
    </div>

    <div class="section-title">Lookup Specific n-th Drive Price</div>
    <div class="input-group">
        <input type="number" id="specificN" value="273" oninput="calculate()">
    </div>
    <div class="single-box">
        <span id="singleResult" class="honey-value" style="color:#3498db">0</span>
        <div id="singleNotation" class="notation"></div>
    </div>
</div>

<script>
    function getPriceAtN(n, base) {
        let cost = base * Math.pow(n, 2);
        if (n > 250) {
            let overflow = n - 250;
            // Adjusted multiplier to hit 20.4B at n=273
            let multiplier = 1 + (overflow * 0.00413); 
            cost = cost * multiplier;
        }
        return Math.floor(cost);
    }

    function formatHoney(v) {
        if (v >= 1e12) return (v / 1e12).toFixed(2) + " Trillion";
        if (v >= 1e9) return (v / 1e9).toFixed(2) + " Billion";
        if (v >= 1e6) return (v / 1e6).toFixed(2) + " Million";
        return "";
    }

    function calculate() {
        const base = parseInt(document.getElementById('driveType').value);
        const curr = parseInt(document.getElementById('current').value) || 0;
        const targ = parseInt(document.getElementById('target').value) || 0;
        const spec = parseInt(document.getElementById('specificN').value) || 0;

        let total = 0;
        for (let i = curr + 1; i <= targ; i++) {
            total += getPriceAtN(i, base);
        }
        document.getElementById('result').innerText = total.toLocaleString();
        document.getElementById('notation').innerText = formatHoney(total);

        let single = getPriceAtN(spec, base);
        document.getElementById('singleResult').innerText = single.toLocaleString();
        document.getElementById('singleNotation').innerText = formatHoney(single);
    }
    calculate();
</script>

</body>
</html>
