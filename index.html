<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Drive Calc v1.1</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <meta name="title" content="BSS Drive Cost Calculator 🍯">
    <meta name="description" content="Calculate the total honey cost for 1-500 White, Red, Blue, or Glitch drives. Optimized for mobile.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vth-mikey.github.io/DigitalBeeDrivesCalcu/">
    <meta property="og:title" content="BSS Drive Cost Calculator 🍯">
    <meta property="og:description" content="Precision honey estimation tool for Bee Swarm Simulator. Created by ✯𝑵𝖎𝖌𝖍𝒕.">
    <meta property="og:image" content="https://vth-mikey.github.io/DigitalBeeDrivesCalcu/img/social-preview.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vth-mikey.github.io/DigitalBeeDrivesCalcu/">
    <meta property="twitter:title" content="BSS Drive Cost Calculator 🍯">
    <meta property="twitter:description" content="Calculate the path to 500 drives with accuracy.">
    <meta property="twitter:image" content="https://vth-mikey.github.io/DigitalBeeDrivesCalcu/img/social-preview.png">

    <style>
        /* THEME VARIABLES */
        :root {
            --bg-color: #0d0d0d;
            --container-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --input-bg: #222;
            --border-color: #333;
            --section-title: #f1c40f;
        }

        .light-mode {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #2d3436;
            --input-bg: #fff;
            --border-color: #dfe6e9;
            --section-title: #d4a017;
        }

        body { 
            /* UPDATED: BSS Font Family */
            font-family: 'Source Sans 3', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s;
        }

        .container { 
            background: var(--container-bg); 
            padding: 1.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid var(--border-color); 
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .title-icon {
            width: 28px;
            height: 28px;
            vertical-align: middle;
            margin-right: 10px;
            object-fit: contain;
        }

        h2 { 
            text-align: center; 
            color: #f1c40f; 
            margin-bottom: 1.5rem; 
            text-transform: uppercase; 
            font-size: 1.2rem; 
            margin-top: 30px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700; /* Extra bold for titles */
        }
        
        .heads-up { 
            background: rgba(52, 152, 219, 0.1); 
            border: 1px solid #3498db; 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            color: #3498db; 
            margin-bottom: 1.5rem; 
        }

        .section-title { 
            font-size: 0.8rem; 
            color: var(--section-title); 
            margin-bottom: 8px; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 4px; 
            text-transform: uppercase; 
            font-weight: 700; 
            margin-top: 20px; 
        }

        input, select { 
            width: 100%; padding: 10px; border: 1px solid var(--border-color); 
            border-radius: 8px; background: var(--input-bg); 
            color: var(--text-color); font-size: 1rem; box-sizing: border-box; 
            font-family: 'Source Sans 3', sans-serif;
        }

        .result-box, .single-box { 
            background: rgba(0,0,0,0.05); 
            padding: 1.2rem; 
            border-radius: 8px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .result-box { border-left: 4px solid #2ecc71; }
        .single-box { border-left: 4px solid #3498db; }

        .honey-value { font-size: 1.4rem; font-weight: 800; color: #2ecc71; margin: 8px 0; }
        
        .currency-label {
            color: #f39c12;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(243, 156, 18, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }

        .notation { color: #f1c40f; font-size: 0.95rem; font-weight: 600; min-height: 1.2rem; }

        .row { display: flex; gap: 10px; margin-bottom: 20px; }

        .btn-reset { width: 100%; margin-top: 15px; background: var(--input-bg); color: #888; border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'Source Sans 3', sans-serif; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #666; }
        .footer a { color: #f1c40f; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
    
    <h2>
        <img src="img/Hivesticker_party_robo_bear.webp" class="title-icon" alt="BSS"> 
        BSS Drives Calculator
    </h2>
    
    <div class="heads-up">
        <strong>Scaling Note:</strong> Drives 251-500 include in-game exponential scaling.
    </div>

    <div class="input-group">
        <label style="font-size: 0.85rem; opacity: 0.7;">Drive Type</label>
        <select id="driveType" onchange="calculate()">
            <option value="250000">Colored (White / Red / Blue)</option>
            <option value="1000000">Glitch Drive</option>
        </select>
    </div>

    <div class="section-title">Total Honey Needed</div>
    <div class="row">
        <div style="flex: 1;">
            <label style="font-size: 0.75rem; opacity: 0.7;">Current Drives</label>
            <input type="number" id="current" placeholder="Amount" oninput="calculate()">
        </div>
        <div style="flex: 1;">
            <label style="font-size: 0.75rem; opacity: 0.7;">Target Drives</label>
            <input type="number" id="target" placeholder="Amount" oninput="calculate()">
        </div>
    </div>

    <div class="result-box">
        <div class="currency-label">🍯 Honey Cost</div>
        <span id="result" class="honey-value">0</span>
        <div id="notation" class="notation"></div>
    </div>

    <div class="section-title">Specific Drive Lookup</div>
    <div style="margin-bottom: 15px;">
        <label style="font-size: 0.75rem; opacity: 0.7;">Check specific drive number cost (e.g. 273rd colored drive costs 20.4B Honey)</label>
        <input type="number" id="specificN" placeholder="Drive number" oninput="calculate()">
    </div>
    <div class="single-box">
        <div class="currency-label" style="color:#3498db; background: rgba(52, 152, 219, 0.1);">🍯 Honey Cost</div>
        <span id="singleResult" class="honey-value" style="color:#3498db">0</span>
        <div id="singleNotation" class="notation"></div>
    </div>

    <button class="btn-reset" onclick="resetForm()">Reset Input</button>

    <div class="footer">
        Created by <a href="https://guns.lol/nightnosleep" target="_blank">✯𝑵𝖎𝖌𝖍𝒕</a>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('light-mode');
        const isLight = body.classList.contains('light-mode');
        localStorage.setItem('bss_theme', isLight ? 'light' : 'dark');
        btn.innerText = isLight ? '🌙' : '☀️';
    }

    window.onload = function() {
        if(localStorage.getItem('bss_theme') === 'light') {
            document.body.classList.add('light-mode');
            document.getElementById('themeBtn').innerText = '🌙';
        }
        if(localStorage.getItem('bss_curr')) document.getElementById('current').value = localStorage.getItem('bss_curr');
        if(localStorage.getItem('bss_targ')) document.getElementById('target').value = localStorage.getItem('bss_targ');
        if(localStorage.getItem('bss_spec')) document.getElementById('specificN').value = localStorage.getItem('bss_spec');
        if(localStorage.getItem('bss_type')) document.getElementById('driveType').value = localStorage.getItem('bss_type');
        calculate();
    };

    function getPriceAtN(n, base) {
        if (n <= 0) return 0;
        let cost = base * Math.pow(n, 2);
        if (n > 250) {
            let overflow = n - 250;
            let multiplier = 1 + (overflow * 0.00413); 
            cost = cost * multiplier;
        }
        return Math.floor(cost);
    }

    function formatHoney(v) {
        if (v <= 0) return "";
        if (v >= 1e15) return (v / 1e15).toFixed(3) + " Quadrillion";
        if (v >= 1e12) return (v / 1e12).toFixed(2) + " Trillion";
        if (v >= 1e9) return (v / 1e9).toFixed(2) + " Billion";
        if (v >= 1e6) return (v / 1e6).toFixed(2) + " Million";
        return "";
    }

    function calculate() {
        const base = parseInt(document.getElementById('driveType').value);
        const curr = parseInt(document.getElementById('current').value) || 0;
        const targ = parseInt(document.getElementById('target').value) || 0;
        const spec = parseInt(document.getElementById('specificN').value) || 0;

        localStorage.setItem('bss_curr', document.getElementById('current').value);
        localStorage.setItem('bss_targ', document.getElementById('target').value);
        localStorage.setItem('bss_spec', document.getElementById('specificN').value);
        localStorage.setItem('bss_type', base);

        let total = 0;
        if (targ > curr) {
            for (let i = curr + 1; i <= targ; i++) {
                total += getPriceAtN(i, base);
            }
        }
        
        document.getElementById('result').innerText = total.toLocaleString();
        document.getElementById('notation').innerText = formatHoney(total);

        let single = getPriceAtN(spec, base);
        document.getElementById('singleResult').innerText = single.toLocaleString();
        document.getElementById('singleNotation').innerText = formatHoney(single);
    }

    function resetForm() {
        if(confirm("Wipe all saved data?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
